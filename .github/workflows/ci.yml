name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Beide Jobs laufen parallel. Backend braucht Docker (Testcontainers fuer
# ephemeren Postgres in den @QuarkusTest-Klassen) — Ubuntu-Runner haben Docker
# vorinstalliert. Externe APIs (TheMealDB, OpenFoodFacts, Ollama) sind in
# allen Tests via @InjectMock isoliert, daher kein Internet-Bedarf.
jobs:
  backend:
    name: Backend (Quarkus / Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Checkstyle (non-blocking)
        run: ./mvnw -B checkstyle:check
        continue-on-error: true

      - name: Run tests
        run: ./mvnw -B test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  frontend:
    name: Frontend (Vue / Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint (check-only, kein Auto-Fix)
        run: npm run lint:ci

      - name: Unit tests (Vitest + MSW)
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
