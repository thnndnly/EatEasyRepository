# ---------- HTTP ----------
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type
quarkus.http.cors.exposed-headers=Content-Disposition

# ---------- Datasource ----------
# JDBC-URL/Credentials werden nur in dev/prod gesetzt — im Test-Profil greift
# Quarkus Dev Services und startet einen ephemeren Postgres-Testcontainer.
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=${DB_USER:eateasy}
%dev.quarkus.datasource.password=${DB_PASSWORD:eateasy}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eateasy}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eateasy}

# ---------- Hibernate ORM (Panache) ----------
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.sql=false

# ---------- Flyway ----------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# ---------- SmallRye JWT ----------
mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=https://eateasy.local
smallrye.jwt.sign.key.location=classpath:privateKey.pem
smallrye.jwt.new-token.issuer=https://eateasy.local
smallrye.jwt.new-token.lifespan=28800
quarkus.smallrye-jwt.enabled=true

# ---------- Mailer ----------
quarkus.mailer.from=noreply@eateasy.local
quarkus.mailer.host=${MAIL_HOST:localhost}
quarkus.mailer.port=${MAIL_PORT:1025}
quarkus.mailer.start-tls=DISABLED
quarkus.mailer.mock=false

# Frontend-URL fuer Token-Links in Einladungs-Mails. In Production ueber
# Env-Var setzen; lokal greift der Vite-Dev-Server-Default.
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ---------- Ollama (Smart-Suggestion) ----------
# Direkt-HTTP-Client (kein MP-REST), weil der @RegisterRestClient-Pfad in
# unserer Dev-Konfig unzuverlaessig auf den Quarkus-Self-Port zurueckfiel.
ollama.url=${OLLAMA_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3}
ollama.read-timeout-seconds=60

# ---------- Beleg-Scanner (Phase 11, Stretch) ----------
# Feature-Flag: aus = Endpoint antwortet 404 (fuer Deployments ohne
# Tesseract/Ollama, z. B. Render-Demo). Lokal per Default an.
eateasy.receipt.enabled=${EATEASY_RECEIPT_ENABLED:true}
# Tesseract-HTTP-Wrapper (hertzg/tesseract-server) aus docker-compose.dev.yml.
tesseract.url=${TESSERACT_URL:http://localhost:8884}
tesseract.read-timeout-seconds=30
# Upload-Limit fuer Belegfotos.
quarkus.http.limits.max-body-size=12M

# ---------- Google OAuth (Phase 12, Stretch) ----------
# Feature-Flag: aus (Default) = /api/v1/auth/google antwortet 404. Erst mit
# gesetzter Client-ID (Google-Cloud-OAuth-Client) sinnvoll aktivierbar.
eateasy.google-oauth.enabled=${EATEASY_GOOGLE_OAUTH_ENABLED:false}
# OAuth-2.0-Client-ID (Web) aus der Google Cloud Console; dient als Audience
# bei der Token-Verifikation. Ohne Wert ist kein Google-Login moeglich.
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

# ---------- Externe Integrationen ----------
# Rezept-Import laeuft ausschliesslich ueber TheMealDB (gratis, kein API-Key).
# Spoonacular ist bewusst nicht implementiert (siehe IMPLEMENTATION.md Phase 7).
integration.openfoodfacts.url=https://world.openfoodfacts.org

# REST-Client: TheMealDB (gratis, kein Key) — Default-Quelle fuer Rezept-Import.
# Scope = ApplicationScoped, damit Tests ihn via @InjectMock ersetzen koennen
# (Singleton-Beans laufen nicht durch den Mockito-Proxy von quarkus-junit5-mockito).
quarkus.rest-client.themealdb.url=${THEMEALDB_URL:https://www.themealdb.com}
quarkus.rest-client.themealdb.scope=jakarta.enterprise.context.ApplicationScoped

# REST-Client: OpenFoodFacts — Barcode-Lookup fuer die Vorratskammer.
quarkus.rest-client.openfoodfacts.url=${OPENFOODFACTS_URL:https://world.openfoodfacts.org}
quarkus.rest-client.openfoodfacts.scope=jakarta.enterprise.context.ApplicationScoped

# ---------- OpenAPI / Swagger UI ----------
# Doku-Endpunkte: /q/openapi (Spezifikation), /q/swagger-ui (interaktiv).
# always-include=true blendet die UI auch im prod-Profil ein — sonst nur in dev.
quarkus.smallrye-openapi.info-title=EatEasy API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.info-description=Haushaltsweite Mahlzeitenplanung, Rezepte, Vorrat und Einkaufslisten.
quarkus.smallrye-openapi.info-contact-name=Gruppe 5
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=BearerAuth
quarkus.smallrye-openapi.security-scheme-description=JWT via Authorization-Header (Bearer-Token aus /api/v1/auth/login).
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.title=EatEasy API
quarkus.swagger-ui.theme=original

# ---------- Dev-Profil ----------
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.category."de.eateasy".level=DEBUG
%dev.quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG
%dev.quarkus.log.category."io.quarkus.rest.client".level=DEBUG

# ---------- Test-Profil ----------
# Keine JDBC-URL → Dev Services startet einen Postgres-Testcontainer (Docker erforderlich).
%test.quarkus.datasource.devservices.image-name=postgres:16
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.mailer.mock=true
